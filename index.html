<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Operaciones con Números Complejos</title>
</head>
<body>
    <h1>Operaciones con Números Complejos</h1>
    <div>
        <label for="real1">Parte Real 1:</label>
        <input type="text" id="real1">
        <label for="imag1">Parte Imaginaria 1:</label>
        <input type="text" id="imag1">
        <br>
        <label for="real2">Parte Real 2:</label>
        <input type="text" id="real2">
        <label for="imag2">Parte Imaginaria 2:</label>
        <input type="text" id="imag2">
        <br>
        <button onclick="sumar()">Sumar</button>
        <button onclick="restar()">Restar</button>
        <button onclick="multiplicar()">Multiplicar</button>
        <button onclick="dividir()">Dividir</button>
    </div>
    <div id="resultado"></div>

    <script src="script.js"></script>
</body>
</html>
